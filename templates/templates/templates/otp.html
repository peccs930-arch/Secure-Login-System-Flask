<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Enter OTP</h1>

<p>
Check your terminal for OTP.
</p>

<form method="POST">

    <input type="text"
           name="otp"
           placeholder="Enter OTP"
           required>

    <button type="submit">
        Verify
    </button>

</form>

</body>
