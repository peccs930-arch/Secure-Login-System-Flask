<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Login</h1>

<form method="POST">

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <button type="submit">
        Login
    </button>

</form>

<p>
<a href="/register">Register</a>
</p>

</body>
</html>
